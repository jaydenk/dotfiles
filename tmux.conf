# tmux.conf
# Modernised for tmux 3.6a

########################
### GENERAL SETTINGS ###
########################

set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0

# Set parent terminal title to reflect current window in tmux session
set -g set-titles on
set -g set-titles-string "#I:#W"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Synchronise panels
bind 0 setw synchronize-panes

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Don't rename windows automatically
set -g allow-rename off

# Set default terminal mode to 256 colours with true colour support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Reload .tmux.conf with Ctrl-r
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

####################
### KEY BINDINGS ###
####################

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# New window and retain cwd
bind c new-window -c "#{pane_current_path}"

# Prompt to rename window right after it's created
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# Rename session and window
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

######################
### DESIGN CHANGES ###
######################

# Quiet
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Modes
setw -g clock-mode-colour colour5
setw -g mode-style "fg=colour1,bg=colour18,bold"

# Panes
set -g pane-border-style "fg=colour19,bg=colour0"
set -g pane-active-border-style "fg=blue,bg=colour0"

# Statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=colour137,bg=colour18,dim"
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour19,bold] %d/%m #[fg=colour233,bg=colour8,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style "fg=colour1,bg=colour19,bold"
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

setw -g window-status-style "fg=colour9,bg=colour18"
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style "fg=colour255,bg=colour1,bold"

# Messages
set -g message-style "fg=colour232,bg=colour16,bold"
